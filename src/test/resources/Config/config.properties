url=https://opensource-demo.orangehrmlive.com/web/index.php/auth/login
browser=Chrome

#Dynamic Reports --> yes or no
#if yes -> Reports will have the index.html file name
#if no -> Reports will have the current time+ index.html file name
overridereports = yes

#Passed Steps Screenshots --> yes/no
passedstepsscreenshots = no

#Failed Steps Screenshots --> yes/no
failedstepsscreenshots = yes

#Skipped Steps Screenshots --> yes/no
skippedstepssreenshots = yes

#Retry failed test --> yes/no
retryfailedtests=no

#Run in local or remote --> local/remote
runmode=local